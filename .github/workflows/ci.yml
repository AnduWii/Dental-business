name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests + coverage threshold
        run: npm run test:cov

      - name: Build
        run: npm run build

      - name: Dependency audit (high severity)
        run: npm audit --audit-level=high
        continue-on-error: true # report, don't block — triaged via Dependabot
